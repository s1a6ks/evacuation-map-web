name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - master # Перевірте, якщо ваша гілка називається main — змініть на main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        working-directory: ./evacuation-frontend
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: evacuation-frontend/dist
          branch: gh-pages
